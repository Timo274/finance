# Конфиг Fly.io. Имя приложения подставится при `fly launch`/`fly deploy`.
app = "salary-planner-475c5d"
primary_region = "fra"  # Франкфурт — ближайший к Киеву регион Fly

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DB_PATH = "/data/app.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Постоянный диск под SQLite (данные переживают рестарты/деплои).
[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
