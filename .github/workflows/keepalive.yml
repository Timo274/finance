# Будит Fly-машину раз в час: auto_stop_machines останавливает процесс,
# и внутренний планировщик напоминаний (payday, дедлайны, цены) не срабатывает.
# Пинг /healthz поднимает машину, через минуту срабатывает catch-up-свип.
# Настройка: добавьте repository variable APP_URL (например, https://app.fly.dev).
name: keepalive

on:
  schedule:
    - cron: "7 * * * *" # каждый час
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL repository variable is not set — skipping."
            exit 0
          fi
          curl --fail --silent --show-error --max-time 30 "$APP_URL/healthz"
